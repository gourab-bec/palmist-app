<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Palmly — Read Your Palm with AI</title>
<meta name="description" content="Palmly reads your palm with AI. Upload a photo, get a fun, detailed reading about your life, love, career and future." />
<meta name="theme-color" content="#1b1145" />

<!-- Open Graph for social sharing (Facebook / Insta / WhatsApp) -->
<meta property="og:title" content="Palmly — Read Your Palm with AI" />
<meta property="og:description" content="Upload a photo of your palm and get a fun, detailed AI reading of your life, love, and future. ✋✨" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://palmist.getbriefed.to" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    /* Palmly palette — bright, playful, contrasting, a little cosmic */
    --indigo: #1b1145;        /* deep night base */
    --indigo-2: #2d1b69;      /* lighter night */
    --grape: #6c3bf4;         /* electric violet */
    --coral: #ff5d73;         /* hot coral */
    --marigold: #ffb23e;      /* warm gold */
    --peach: #ffd6a5;         /* soft peach */
    --mint: #4ee6c4;          /* bright contrast pop */
    --cream: #fff6ee;         /* near-white text */
    --cream-dim: rgba(255, 246, 238, 0.72);
    --ink: #1a0f33;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    background: var(--indigo);
  }
  .bg-aurora {
    position: relative;
    background:
      radial-gradient(ellipse 80% 60% at 15% 0%, rgba(108, 59, 244, 0.55) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 90% 15%, rgba(255, 93, 115, 0.45) 0%, transparent 50%),
      radial-gradient(ellipse 90% 70% at 50% 100%, rgba(255, 178, 62, 0.35) 0%, transparent 55%),
      linear-gradient(160deg, var(--indigo) 0%, var(--indigo-2) 55%, var(--ink) 100%);
  }
  .bg-aurora::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(2px 2px at 12% 22%, rgba(78,230,196,0.7), transparent),
      radial-gradient(2px 2px at 82% 42%, rgba(255,246,238,0.6), transparent),
      radial-gradient(1.5px 1.5px at 32% 82%, rgba(255,178,62,0.7), transparent),
      radial-gradient(2px 2px at 92% 88%, rgba(255,93,115,0.6), transparent),
      radial-gradient(1.5px 1.5px at 52% 12%, rgba(255,246,238,0.7), transparent),
      radial-gradient(2px 2px at 70% 65%, rgba(78,230,196,0.5), transparent);
    pointer-events: none;
    animation: shimmer 6s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }

  .display { font-family: 'Fraunces', Georgia, serif; }
  .grad-text {
    background: linear-gradient(100deg, var(--marigold) 0%, var(--coral) 45%, var(--grape) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .grad-text-2 {
    background: linear-gradient(100deg, var(--mint) 0%, var(--marigold) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .card {
    background: rgba(255, 246, 238, 0.06);
    border: 1.5px solid rgba(255, 246, 238, 0.14);
    backdrop-filter: blur(16px);
    border-radius: 28px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }

  label {
    font-weight: 700; font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--marigold);
    margin-bottom: 0.5rem; display: block;
  }
  input, select {
    width: 100%;
    background: rgba(27, 17, 69, 0.5);
    border: 1.5px solid rgba(255,246,238,0.18);
    color: var(--cream);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem; font-weight: 500;
    padding: 0.85rem 1.1rem; border-radius: 16px;
    transition: all .25s;
  }
  input:focus, select:focus {
    outline: none; border-color: var(--mint);
    box-shadow: 0 0 0 4px rgba(78,230,196,0.18);
  }
  input::placeholder { color: rgba(255,246,238,0.4); }

  .btn {
    width: 100%;
    background: linear-gradient(100deg, var(--coral) 0%, var(--grape) 100%);
    color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 1.1rem; letter-spacing: 0.02em;
    padding: 1.1rem 2rem; border: none; border-radius: 18px;
    cursor: pointer; transition: all .25s;
    box-shadow: 0 12px 30px -8px rgba(255,93,115,0.6);
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.01); box-shadow: 0 18px 40px -8px rgba(108,59,244,0.6); }
  .btn:active { transform: translateY(0) scale(.99); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }

  .upload {
    border: 2.5px dashed rgba(255,246,238,0.3);
    background: rgba(27,17,69,0.35);
    padding: 1.6rem 1rem; text-align: center;
    cursor: pointer; transition: all .25s; border-radius: 20px;
  }
  .upload:hover { border-color: var(--mint); background: rgba(78,230,196,0.07); }
  .upload.filled { padding: .5rem; border-style: solid; border-color: var(--marigold); }
  .upload img { max-width: 100%; max-height: 190px; border-radius: 14px; margin: 0 auto; display: block; }

  .chip {
    display: inline-flex; align-items: center; gap: .4rem;
    background: rgba(78,230,196,0.14); color: var(--mint);
    font-weight: 700; font-size: .72rem; letter-spacing: .08em;
    padding: .35rem .8rem; border-radius: 999px; text-transform: uppercase;
  }

  .orb {
    width: 96px; height: 96px; margin: 0 auto; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--marigold), var(--coral) 55%, var(--grape) 100%);
    box-shadow: 0 0 70px -5px var(--coral);
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-10px) scale(1.06)} }

  .reveal-up { animation: revealUp .6s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes revealUp { from{opacity:0; transform:translateY(18px)} to{opacity:1; transform:translateY(0)} }

  /* Reading typography */
  .report { line-height: 1.8; font-size: 1.05rem; color: var(--cream); }
  .report h1 { font-family:'Fraunces',serif; font-size: 1.9rem; font-weight: 800; text-align:center; margin: 1.5rem 0 1rem;
    background: linear-gradient(100deg, var(--marigold), var(--coral) 50%, var(--grape));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .report h2 { font-family:'Fraunces',serif; font-size: 1.4rem; font-weight: 700; color: var(--marigold);
    margin: 2.2rem 0 .8rem; padding-bottom:.5rem; border-bottom: 2px solid rgba(255,178,62,0.25); }
  .report h3 { font-weight: 800; font-size: 1.05rem; color: var(--mint); margin: 1.4rem 0 .4rem; letter-spacing:.02em; }
  .report p { margin: 1rem 0; }
  .report strong { color: var(--marigold); font-weight: 700; }
  .report em { color: var(--peach); }
  .report ul, .report ol { padding-left: 1.4rem; margin: 1rem 0; }
  .report li { margin: .5rem 0; }
  .report li::marker { color: var(--coral); }
  .report hr { border:none; height:2px; background: linear-gradient(to right, transparent, var(--coral), transparent); margin: 2.2rem 0; }

  details > summary { cursor:pointer; list-style:none; }
  details > summary::-webkit-details-marker { display:none; }
  .arrow { transition: transform .3s; display:inline-block; }
  details[open] .arrow { transform: rotate(90deg); }

  .stream-cursor::after { content:'▍'; color: var(--mint); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50%{opacity:0} }

  @media (max-width:640px){
    .report h1{font-size:1.5rem} .report h2{font-size:1.2rem} .report{font-size:1rem}
  }
</style>
</head>
<body class="bg-aurora">
<div id="app"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;

function App() {
  const [step, setStep] = useState('intake');
  const [name, setName] = useState('');
  const [gender, setGender] = useState('Female');
  const [age, setAge] = useState('');
  const [rightHand, setRightHand] = useState(null);
  const [leftHand, setLeftHand] = useState(null);
  const [rightPreview, setRightPreview] = useState(null);
  const [leftPreview, setLeftPreview] = useState(null);
  const [report, setReport] = useState('');
  const [error, setError] = useState('');
  const [progress, setProgress] = useState('');
  const [uploading, setUploading] = useState(null);

  // Convert any image (incl. iPhone HEIC) to a downscaled JPEG via canvas.
  const processImage = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1100;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const c = document.createElement('canvas');
        c.width = width; c.height = height;
        c.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(c.toDataURL('image/jpeg', 0.86));
      };
      img.onerror = () => reject(new Error('Could not read this image. Try a JPEG or PNG.'));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error('Could not read the file.'));
    reader.readAsDataURL(file);
  });

  const handleUpload = async (e, hand) => {
    const file = e.target.files[0];
    if (!file) return;
    setError(''); setUploading(hand);
    try {
      const jpeg = await processImage(file);
      if (hand === 'right') { setRightHand(jpeg); setRightPreview(jpeg); }
      else { setLeftHand(jpeg); setLeftPreview(jpeg); }
    } catch (err) {
      setError(err.message || 'That image could not be processed.');
    } finally { setUploading(null); }
  };

  const clearImage = (hand) => {
    if (hand === 'right') { setRightHand(null); setRightPreview(null); }
    else { setLeftHand(null); setLeftPreview(null); }
  };

  const generateReport = async () => {
    if (!name.trim() || !age.trim()) { setError('Please enter your name and age.'); return; }
    if (!rightHand && !leftHand) { setError('Please add at least one palm photo.'); return; }
    setError(''); setStep('reading'); setProgress('Warming up the cosmic engine...');

    try {
      const msgs = ['Tracing the lines of your palm...','Reading your mounts and stars...','Consulting the planets...','Weaving your five-year forecast...','Almost there — your reading takes shape...'];
      let i = 0;
      const timer = setInterval(() => { setProgress(msgs[i % msgs.length]); i++; }, 6000);

      let proToken = '', proEmail = '';
      try { proToken = localStorage.getItem('palmly_pro_token') || ''; proEmail = localStorage.getItem('palmly_pro_email') || ''; } catch {}

      const headers = { 'Content-Type': 'application/json' };
      if (proToken) headers['X-Pro-Token'] = proToken;

      const response = await fetch('/api/read-palm', {
        method: 'POST', headers,
        body: JSON.stringify({ name:String(name), gender:String(gender), age:String(age), rightHand:rightHand||null, leftHand:leftHand||null, email:proEmail }),
      });
      clearInterval(timer);

      const ct = response.headers.get('content-type') || '';
      if (!response.ok || ct.includes('application/json')) {
        let data = {};
        try { data = await response.json(); } catch {}
        if (data.upgrade) { setError(data.error || 'Free readings used up.'); setStep('intake'); return; }
        throw new Error(data.error || 'Reading failed.');
      }

      setStep('report'); setReport('');
      const reader = response.body.getReader();
      const dec = new TextDecoder();
      let acc = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        acc += dec.decode(value, { stream: true });
        setReport(acc);
      }
      if (!acc.trim()) throw new Error('The reading came back empty. Please try again.');
    } catch (err) {
      setError(err.message || 'The stars are clouded. Please try again.');
      setStep('intake');
    }
  };

  const reset = () => {
    setStep('intake'); setName(''); setAge(''); setGender('Female');
    setRightHand(null); setLeftHand(null); setRightPreview(null); setLeftPreview(null);
    setReport(''); setError('');
  };

  const renderReport = (md) => {
    let html = md
      .replace(/^# (.*$)/gim, '<h1>$1</h1>')
      .replace(/^## (.*$)/gim, '<h2>$1</h2>')
      .replace(/^### (.*$)/gim, '<h3>$1</h3>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^---$/gim, '<hr/>')
      .replace(/^- (.*$)/gim, '<li>$1</li>')
      .split('\n\n').map(p => {
        if (p.startsWith('<h')||p.startsWith('<hr')||p.startsWith('<li')) return p;
        if (p.trim()==='') return '';
        return '<p>'+p.replace(/\n/g,'<br/>')+'</p>';
      }).join('\n')
      .replace(/(<li>.*?<\/li>\n?)+/g, m => '<ul>'+m+'</ul>');
    return { __html: html };
  };

  const Logo = () => (
    <div className="flex items-center justify-center gap-2 mb-3">
      <span style={{fontSize:'2rem'}}>✋</span>
      <span className="display grad-text" style={{fontSize:'2.6rem', fontWeight:900, letterSpacing:'-0.02em'}}>Palmly</span>
      <span style={{fontSize:'1.4rem'}}>✨</span>
    </div>
  );

  return (
    <div className="min-h-screen relative" style={{zIndex:1}}>
      <header className="relative pt-12 pb-6 px-4 text-center reveal-up" style={{zIndex:2}}>
        <Logo />
        <p className="font-bold tracking-wide" style={{color:'var(--cream-dim)', fontSize:'1rem'}}>
          Your palm, read by AI ✋ in 30 seconds
        </p>
      </header>

      {step === 'intake' && (
        <main className="relative px-4 pb-16 max-w-xl mx-auto reveal-up" style={{zIndex:2}}>
          <div className="card p-6 sm:p-8">
            <div className="text-center mb-6">
              <span className="chip">🔮 Free reading</span>
            </div>

            <div className="space-y-5">
              <div>
                <label>Your name</label>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="What should we call you?" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label>Gender</label>
                  <select value={gender} onChange={e=>setGender(e.target.value)}>
                    <option>Female</option><option>Male</option><option>Other</option>
                  </select>
                </div>
                <div>
                  <label>Age</label>
                  <input type="number" value={age} onChange={e=>setAge(e.target.value)} placeholder="Age" min="1" max="120" />
                </div>
              </div>

              <div className="text-center pt-1">
                <span className="font-bold" style={{color:'var(--marigold)', fontSize:'.8rem', letterSpacing:'.1em', textTransform:'uppercase'}}>📸 Add your palm</span>
              </div>

              <div className="grid grid-cols-2 gap-3">
                {[['right','Right hand','✋'],['left','Left hand','🤚']].map(([hand,labelText,emoji]) => {
                  const preview = hand==='right'?rightPreview:leftPreview;
                  return (
                    <div key={hand}>
                      <label>{labelText}</label>
                      <label className={`upload block ${preview?'filled':''}`}>
                        {preview ? (
                          <div>
                            <img src={preview} alt={labelText} />
                            <button type="button" onClick={(e)=>{e.preventDefault();clearImage(hand);}} className="font-bold mt-2 underline" style={{color:'var(--coral)', fontSize:'.8rem'}}>Remove</button>
                          </div>
                        ) : uploading===hand ? (
                          <div style={{padding:'1rem 0'}}><div className="orb" style={{width:40,height:40}}></div></div>
                        ) : (
                          <div>
                            <div style={{fontSize:'1.8rem'}}>{emoji}</div>
                            <p className="font-bold mt-1" style={{fontSize:'.85rem'}}>Tap to add</p>
                          </div>
                        )}
                        <input type="file" accept="image/*,.heic,.heif" className="hidden" onChange={e=>handleUpload(e,hand)} />
                      </label>
                    </div>
                  );
                })}
              </div>
              <p className="text-center" style={{color:'var(--cream-dim)', fontSize:'.85rem'}}>One hand works. Both reveal more. 🌟</p>

              {error && <div className="text-center font-semibold" style={{color:'var(--coral)'}}>{error}</div>}

              <button onClick={generateReport} className="btn" disabled={uploading}>
                Reveal My Reading ✨
              </button>
            </div>
          </div>

          <details className="mt-5 card p-4">
            <summary className="flex items-center gap-2 font-bold" style={{color:'var(--marigold)', fontSize:'.85rem'}}>
              <span className="arrow">▸</span> Is this for real?
            </summary>
            <p style={{color:'var(--cream-dim)', fontSize:'.92rem', marginTop:'.6rem', lineHeight:1.6}}>
              Palmistry is a fun, ancient tradition — not science! Palmly blends classic Indian and Western palm-reading wisdom into a playful reading just for you. Take what sparks joy, leave the rest. 💛
            </p>
          </details>
        </main>
      )}

      {step === 'reading' && (
        <main className="relative px-4 py-20 max-w-md mx-auto text-center reveal-up" style={{zIndex:2}}>
          <div className="orb mb-8"></div>
          <p className="display grad-text-2" style={{fontSize:'1.6rem', fontWeight:700, marginBottom:'.5rem'}}>Reading your palm</p>
          <p className="font-medium" style={{color:'var(--cream-dim)', fontSize:'1.05rem'}}>{progress}</p>
        </main>
      )}

      {step === 'report' && (
        <main className="relative px-4 pb-16 max-w-2xl mx-auto reveal-up" style={{zIndex:2}}>
          <div className="card p-6 sm:p-9">
            <div className="text-center mb-2"><span className="chip">✨ {name}'s reading</span></div>
            <div className="report stream-cursor" dangerouslySetInnerHTML={renderReport(report)} />
            <div className="mt-10 space-y-3">
              <button onClick={reset} className="btn">Read Another Palm ✋</button>
              <button onClick={()=>{
                const shareText = `I just got my palm read by Palmly! ✋✨ Try yours free:`;
                const url = 'https://palmist.getbriefed.to';
                if (navigator.share) { navigator.share({title:'Palmly', text:shareText, url}).catch(()=>{}); }
                else { navigator.clipboard?.writeText(url); alert('Link copied! Share it with friends ✨'); }
              }} className="w-full font-bold underline" style={{color:'var(--mint)', background:'none', border:'none', cursor:'pointer', fontSize:'.95rem'}}>
                Share Palmly with a friend 💌
              </button>
            </div>
          </div>
        </main>
      )}

      <footer className="relative text-center py-8 px-4" style={{zIndex:2}}>
        <p style={{color:'var(--cream-dim)', fontSize:'.8rem'}}>Made with ✨ · Palmly reads for fun, not fortune</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
